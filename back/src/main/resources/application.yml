spring:
  profiles:
    active: dev  # 기본값을 'dev'로 설정, 운영에서는 'prod'로 변경
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 1800 # 30분
  refresh-token-validity: 1209600 # 2주

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"

file:
  upload-dir: uploads